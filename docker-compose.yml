services:
  backend:
    build: ./backend
    container_name: portfolio_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
